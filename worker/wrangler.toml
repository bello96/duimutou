name = "duimutou-worker"
main = "src/index.ts"
compatibility_date = "2024-12-05"
workers_dev = true

routes = [
  { pattern = "duimutou.dengjiabei.cn/api/*", zone_name = "dengjiabei.cn" }
]

[durable_objects]
bindings = [
  { name = "STACK_ROOM", class_name = "StackRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StackRoom"]
